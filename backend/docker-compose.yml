services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      APP_NAME: Cognet
      API_V1_PREFIX: /api/v1
      MONGODB_URI: mongodb://mongo:27017/cognet
      JWT_SECRET: dev-only-secret-change-me-now-123456
      JWT_ALGORITHM: HS256
      JWT_EXPIRY_HOURS: "24"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: